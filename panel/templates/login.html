<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROXY TELEGRAM @memes4u1337</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d14;
  --card:#13131e;
  --border:#1f1f30;
  --accent:#3b82f6;
  --accent-glow:rgba(59,130,246,.2);
  --text:#f1f5f9;
  --muted:#64748b;
  --danger:#ef4444;
  --font:'Inter',sans-serif;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%,rgba(59,130,246,.12),transparent);
}
.wrap{width:380px;padding:16px}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{
  width:56px;height:56px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  border-radius:16px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  margin-bottom:16px;
  box-shadow:0 8px 32px rgba(59,130,246,.3);
}
.logo h1{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.logo p{font-size:13px;color:var(--muted)}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:32px;
  box-shadow:0 24px 48px rgba(0,0,0,.4);
}
.field{margin-bottom:18px}
.field label{
  display:block;
  font-size:12px;
  font-weight:500;
  color:var(--muted);
  margin-bottom:8px;
  letter-spacing:.02em;
}
.field input{
  width:100%;
  background:#0d0d14;
  border:1px solid var(--border);
  border-radius:10px;
  padding:11px 14px;
  color:var(--text);
  font-family:var(--font);
  font-size:14px;
  outline:none;
  transition:all .2s;
}
.field input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.field input::placeholder{color:#374151}
.error{
  background:rgba(239,68,68,.08);
  border:1px solid rgba(239,68,68,.2);
  color:#fca5a5;
  border-radius:10px;
  padding:10px 14px;
  font-size:13px;
  margin-bottom:18px;
  display:flex;
  align-items:center;
  gap:8px;
}
.btn{
  width:100%;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:10px;
  padding:12px;
  font-family:var(--font);
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s;
  margin-top:4px;
  letter-spacing:.01em;
}
.btn:hover{background:#2563eb;box-shadow:0 4px 16px rgba(59,130,246,.4)}
.btn:active{transform:scale(.98)}
.footer{text-align:center;margin-top:20px;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>PROXY TELEGRAM</h1>
    <p>@memes4u1337 · Control Panel</p>
  </div>
  <div class="card">
    {% if error %}
    <div class="error">⚠ {{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="field">
        <label>ЛОГИН</label>
        <input type="text" name="username" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="field">
        <label>ПАРОЛЬ</label>
        <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">Войти в панель</button>
    </form>
  </div>
  <div class="footer">PROXY TELEGRAM @memes4u1337</div>
</div>
</body>
</html>
