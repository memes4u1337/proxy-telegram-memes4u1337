<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROXY TELEGRAM @memes4u1337 — Вход</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --text: #e2e8f0;
    --muted: #64748b;
    --danger: #ef4444;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: .15;
    pointer-events: none;
  }
  .glow-1 { background: var(--accent); top:-200px; left:-200px; }
  .glow-2 { background: var(--accent2); bottom:-200px; right:-200px; }

  .card {
    position: relative; z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px;
    width: 420px;
    box-shadow: 0 0 0 1px rgba(0,212,255,.05), 0 32px 64px rgba(0,0,0,.4);
    animation: fadeUp .5s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .logo {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-icon {
    font-size: 40px;
    display: block;
    margin-bottom: 12px;
  }

  .logo h1 {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: .05em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: .1em;
  }

  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: .1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,.1);
  }

  .error {
    background: rgba(239,68,68,.1);
    border: 1px solid rgba(239,68,68,.3);
    color: var(--danger);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 20px;
    display: {% if error %}flex{% else %}none{% endif %};
    align-items: center;
    gap: 8px;
  }

  .btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-family: var(--display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    margin-top: 8px;
  }

  .btn:hover { opacity: .9; }
  .btn:active { transform: scale(.98); }

  .divider {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .15em;
    margin-top: 28px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card">
  <div class="logo">
    <span class="logo-icon">⚡</span>
    <h1>PROXY TELEGRAM</h1>
    <p>@memes4u1337 · Control Panel</p>
  </div>

  {% if error %}
  <div class="error">⚠ {{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="field">
      <label>Логин</label>
      <input type="text" name="username" placeholder="admin" autocomplete="username" required>
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">Войти</button>
  </form>

  <div class="divider">PROXY TELEGRAM @memes4u1337</div>
</div>
</body>
</html>
